<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Receipt Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="app-header">
    <div class="app-header__title">
      <span class="app-header__mark">🧾</span>
      <h1>Receipt Generator</h1>
    </div>
    <button id="darkModeToggle" class="btn btn--ghost" type="button" aria-pressed="false">
      <span class="icon-moon" aria-hidden="true">🌙</span>
      <span class="dm-label">Dark mode</span>
    </button>
  </header>

  <main class="layout">

    <!-- ============ LEFT: FORM COLUMN ============ -->
    <section class="form-column" aria-label="Receipt details form">

      <div class="card">
        <h2 class="card__title">Business info</h2>

        <div class="field">
          <label for="businessName">Business name <span class="required">*</span></label>
          <input type="text" id="businessName" placeholder="e.g. Odd Meridian Cafe" required maxlength="60" />
        </div>

        <div class="field">
          <label for="location">Location <span class="required">*</span></label>
          <input type="text" id="location" placeholder="e.g. Westlands, Nairobi" required maxlength="60" />
        </div>

        <div class="field">
          <label for="currency">Currency</label>
          <select id="currency">
            <option value="KES" selected>KES — Kenyan Shilling</option>
            <option value="USD">USD — US Dollar</option>
            <option value="EUR">EUR — Euro</option>
            <option value="GBP">GBP — British Pound</option>
          </select>
        </div>

        <div class="field field--row">
          <label class="checkbox-label" for="useTodayDate">
            <input type="checkbox" id="useTodayDate" checked />
            Use today's date automatically
          </label>
        </div>

        <div class="field" id="customDateField">
          <label for="customDate">Custom date</label>
          <input type="date" id="customDate" disabled />
        </div>

        <div class="field field--row">
          <label class="checkbox-label" for="vatToggle">
            <input type="checkbox" id="vatToggle" />
            Apply VAT (16%)
          </label>
        </div>
      </div>

      <div class="card">
        <h2 class="card__title">Items</h2>

        <div class="item-entry">
          <div class="field item-entry__name">
            <label for="itemName">Item name</label>
            <input type="text" id="itemName" placeholder="e.g. Coffee" maxlength="40" />
          </div>
          <div class="field item-entry__qty">
            <label for="itemQty">Qty</label>
            <input type="number" id="itemQty" min="0" step="any" placeholder="1" />
          </div>
          <div class="field item-entry__price">
            <label for="itemPrice">Unit price</label>
            <input type="number" id="itemPrice" min="0" step="0.01" placeholder="0.00" />
          </div>
          <div class="item-entry__actions">
            <button id="addItemBtn" class="btn btn--accent" type="button">Add item</button>
            <button id="cancelEditBtn" class="btn btn--ghost" type="button" hidden>Cancel edit</button>
          </div>
        </div>
        <p id="itemFormError" class="form-error" role="alert" aria-live="polite"></p>

        <div class="table-wrap">
          <table class="items-table">
            <thead>
              <tr>
                <th scope="col">Item</th>
                <th scope="col">Qty</th>
                <th scope="col">Unit price</th>
                <th scope="col">Line total</th>
                <th scope="col"><span class="sr-only">Actions</span></th>
              </tr>
            </thead>
            <tbody id="itemsBody">
              <!-- rows injected by script.js -->
            </tbody>
          </table>
          <p id="itemsEmptyState" class="empty-state">No items added yet.</p>
        </div>
      </div>

      <div class="card">
        <h2 class="card__title">Footer message</h2>

        <div class="field">
          <label for="footerSelect">Message</label>
          <select id="footerSelect">
            <option value="thanks" selected>Thank you for shopping with us</option>
            <option value="visit">Visit Again</option>
            <option value="noreturn">Goods once sold cannot be returned</option>
            <option value="custom">Custom message</option>
          </select>
        </div>

        <div class="field" id="customFooterField" hidden>
          <label for="customFooterInput">Custom message</label>
          <input type="text" id="customFooterInput" placeholder="Type your own footer message" maxlength="60" />
        </div>
      </div>

      <div class="action-row">
        <button id="generateBtn" class="btn btn--primary" type="button">Generate receipt</button>
        <button id="printBtn" class="btn btn--outline" type="button">Print receipt</button>
      </div>

    </section>

    <!-- ============ RIGHT: RECEIPT PREVIEW ============ -->
    <section class="preview-column" aria-label="Receipt preview">
      <div class="preview-sticky">
        <div class="receipt-wrap" id="printArea">
          <div class="receipt-paper" id="receiptPaper">
            <pre id="receiptContent" class="receipt-content"></pre>
          </div>
        </div>
        <p class="preview-hint">This is how your receipt will look on 80mm thermal paper.</p>
      </div>
    </section>

  </main>

  <footer class="app-footer">
    <p>Runs entirely in your browser — nothing is sent anywhere.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
